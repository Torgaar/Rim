<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R1m Notetaker</title>
    <script>
        // Function to add time chips
        const addTimeChip = (time) => {
            const chipContainer = document.getElementById('time-chips');
            const chip = document.createElement('span');
            chip.className = 'time-chip';
            chip.innerText = `[TIME:${time}]`;
            chipContainer.append(chip);
            chip.addEventListener('click', () => chip.remove()); // Remove chip on click
        };

        // Function to handle the slash command input
        const handleInput = (event) => {
            if (event.key === '/') {
                // Here we would show the slash command menu
                const command = prompt('Enter command:');
                if (command === 'time') {
                    const time = prompt('Enter time (HH:MM):');
                    addTimeChip(time);
                }
            }
        };

        // Add event listener to capture keypress
        document.addEventListener('keypress', handleInput);
    </script>
    <style>
        .time-chip {
            background-color: #e0e0e0;
            border-radius: 5px;
            padding: 5px;
            margin: 3px;
            display: inline-block;
        }
    </style>
</head>
<body>
    <h1>R1m Notetaker</h1>
    <div id="time-chips"></div>
</body>
</html>
