<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>R1m Notetaker</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="icon" type="image/x-icon" href="notetakerlogo.png">

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            50: '#f8fafc',
                            100: '#f1f5f9',
                            500: '#64748b',
                            600: '#475569',
                            900: '#0f172a',
                        }
                    }
                }
            }
        }
    </script>

    <style>
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #e2e8f0; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #cbd5e1; }
        
        .line-clamp-3 { display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden; }
        .editor-view-transition { transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1); }

        /* Icon Picker Styles */
        .icon-option {
            @apply border-2 border-transparent transition-all duration-200 cursor-pointer;
        }
        .icon-option.active {
            @apply border-brand-900 bg-brand-50 ring-4 ring-brand-100;
        }

        /* Context Menu Styles */
        #context-menu {
            display: none;
            position: fixed;
            z-index: 1000;
            min-width: 160px;
        }

        .group-item:hover .group-actions { opacity: 1; }
        .group-actions { opacity: 0; transition: opacity 0.2s; }
    </style>
</head>
<body class="bg-white text-slate-900 font-sans h-screen flex overflow-hidden select-none">

    <!-- Context Menu -->
    <div id="context-menu" class="bg-white border border-slate-200 shadow-xl rounded-xl p-1.5 overflow-hidden">
        <div id="cm-content"></div>
    </div>

    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-slate-900/40 z-40 hidden md:hidden transition-opacity" onclick="toggleSidebar()"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 w-72 bg-slate-50 border-r border-slate-200 flex flex-col z-50 transform -translate-x-full md:translate-x-0 md:static transition-transform duration-300">
        <div class="h-16 flex items-center px-6 border-b border-slate-200">
            <div class="w-8 h-8 bg-brand-900 rounded-lg flex items-center justify-center mr-3 overflow-hidden">
                <img src="notetakerlogo.png" alt="Logo" class="w-full h-full object-cover" onerror="this.innerHTML='<i data-lucide=\'zap\' class=\'w-5 h-5 text-white\'></i>'; this.type='icon';">
            </div>
            <h1 class="text-lg font-bold tracking-tight text-slate-900">R1m Notetaker</h1>
        </div>

        <div class="flex-1 overflow-y-auto py-4 px-3 space-y-1" id="groups-list"></div>

        <div class="p-4 border-t border-slate-200">
            <button onclick="openNewGroupModal()" class="w-full flex items-center justify-center gap-2 px-4 py-2 bg-white border border-slate-200 rounded-lg text-sm font-medium text-slate-600 hover:bg-slate-100 transition-colors">
                <i data-lucide="plus" class="w-4 h-4"></i>
                New Group
            </button>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="flex-1 flex flex-col h-screen min-w-0 bg-white">
        <header class="h-16 flex items-center justify-between px-4 sm:px-8 border-b border-slate-200 bg-white">
            <div class="flex items-center">
                <button class="mr-4 md:hidden text-slate-500" onclick="toggleSidebar()"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <h2 id="current-group-title" class="text-lg font-semibold text-slate-800 font-bold">All Notes</h2>
                <span id="note-count" class="ml-3 px-2 py-0.5 rounded-full bg-slate-100 text-slate-500 text-xs font-medium">0</span>
            </div>
            <button onclick="openEditor()" class="flex items-center px-4 py-2 bg-brand-900 text-white rounded-lg hover:bg-slate-800 transition-all text-sm font-medium shadow-sm">
                <i data-lucide="plus" class="w-4 h-4 mr-2"></i> New Note
            </button>
        </header>

        <div class="flex-1 overflow-y-auto p-4 sm:p-8">
            <div id="notes-grid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
            <div id="empty-state" class="hidden flex flex-col items-center justify-center h-full text-center">
                <i data-lucide="sticky-note" class="w-12 h-12 text-slate-200 mb-4"></i>
                <p class="text-slate-500 text-sm mb-4">Start by creating your first note.</p>
                <button onclick="openEditor()" class="text-brand-900 font-bold hover:underline">Create Note</button>
            </div>
        </div>
    </main>

    <!-- Editor -->
    <div id="editor-view" class="fixed inset-0 bg-white z-[100] hidden flex-col transform translate-x-full editor-view-transition">
        <div class="h-16 flex items-center justify-between px-4 sm:px-8 border-b border-slate-200">
            <button onclick="closeEditor()" class="text-slate-500 hover:text-slate-900 flex items-center text-sm font-medium">
                <i data-lucide="chevron-left" class="w-5 h-5 mr-1"></i> Back
            </button>
            <div class="flex items-center gap-3">
                <div class="flex items-center gap-2 bg-slate-50 p-1 rounded-lg border border-slate-200">
                    <select id="editor-group-select" class="text-sm bg-transparent rounded-lg p-1 outline-none min-w-[100px]"></select>
                    <button onclick="openNewGroupModal()" class="p-1.5 text-slate-400 hover:text-brand-900 hover:bg-white rounded-md transition-all" title="New Group">
                        <i data-lucide="folder-plus" class="w-4 h-4"></i>
                    </button>
                </div>
                <button onclick="saveNote()" class="px-5 py-2 text-sm font-medium text-white bg-brand-900 rounded-lg hover:bg-slate-800 transition-colors shadow-sm">Save</button>
            </div>
        </div>
        <div class="flex-1 p-6 sm:p-12 overflow-y-auto">
            <div class="max-w-3xl mx-auto">
                <input type="text" id="editor-title" placeholder="Title..." class="w-full text-4xl font-bold border-none outline-none mb-6 placeholder-slate-200">
                <textarea id="editor-content" placeholder="Enter a note..." class="w-full h-[60vh] text-lg border-none outline-none resize-none placeholder-slate-200 leading-relaxed"></textarea>
            </div>
        </div>
    </div>

    <!-- Modal: Group Edit/New -->
    <div id="group-modal" class="fixed inset-0 bg-slate-900/60 z-[120] hidden flex items-center justify-center p-4 backdrop-blur-sm opacity-0 transition-opacity duration-200">
        <div class="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 transform scale-95 transition-transform duration-200">
            <h3 id="group-modal-title" class="text-lg font-bold mb-4">New Group</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-bold text-slate-400 uppercase mb-2">Group Name</label>
                    <input type="text" id="group-name-input" placeholder="Enter group name here..." class="w-full px-4 py-2 border border-slate-200 rounded-xl outline-none focus:border-brand-900">
                </div>
                <div>
                    <div class="flex items-center justify-between mb-2">
                        <label class="block text-xs font-bold text-slate-400 uppercase">Select Icon</label>
                        <span id="selected-icon-name" class="text-[10px] font-bold text-brand-900 bg-brand-50 px-2 py-0.5 rounded uppercase">folder</span>
                    </div>
                    <div id="icon-picker" class="grid grid-cols-6 gap-2 mb-4"></div>
                    <div class="relative">
                        <input type="file" id="custom-icon-upload" class="hidden" accept="image/*" onchange="handleIconUpload(event)">
                        <button onclick="document.getElementById('custom-icon-upload').click()" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-xl text-xs text-slate-500 hover:border-brand-900 hover:text-brand-900 transition-all flex items-center justify-center gap-2">
                            <i data-lucide="upload" class="w-3 h-3"></i> Upload Custom Icon
                        </button>
                    </div>
                    <div id="custom-icon-preview-container" class="mt-3 hidden flex items-center gap-3 p-2 bg-slate-50 rounded-lg border border-slate-200">
                        <img id="custom-icon-preview" src="" class="w-8 h-8 rounded object-cover shadow-sm">
                        <span class="text-xs text-slate-500 font-medium flex-1 truncate">Custom icon active</span>
                        <button onclick="clearCustomIcon()" class="text-slate-400 hover:text-red-500"><i data-lucide="trash-2" class="w-4 h-4"></i></button>
                    </div>
                </div>
            </div>
            <div class="flex justify-end gap-3 mt-8">
                <button onclick="closeGroupModal()" class="px-4 py-2 text-sm font-medium text-slate-500">Cancel</button>
                <button onclick="saveGroup()" class="px-6 py-2 text-sm font-medium text-white bg-brand-900 rounded-lg shadow-sm">Save Group</button>
            </div>
        </div>
    </div>

    <script>
        let state = {
            groups: [{ id: '1', name: 'General', icon: 'folder', type: 'lucide' }],
            notes: [],
            currentGroupId: 'all',
            editingNoteId: null,
            editingGroupId: null,
            selectedIcon: 'folder',
            customIconData: null
        };

        const ICONS = [
            'folder', 'briefcase', 'user', 'star', 'heart', 'code', 
            'book', 'coffee', 'zap', 'target', 'home', 'image',
            'shopping-cart', 'camera', 'music', 'plane', 'calendar', 'map'
        ];

        const els = {
            groupsList: document.getElementById('groups-list'),
            notesGrid: document.getElementById('notes-grid'),
            emptyState: document.getElementById('empty-state'),
            currentGroupTitle: document.getElementById('current-group-title'),
            noteCount: document.getElementById('note-count'),
            editorView: document.getElementById('editor-view'),
            editorTitle: document.getElementById('editor-title'),
            editorContent: document.getElementById('editor-content'),
            editorGroupSelect: document.getElementById('editor-group-select'),
            groupModal: document.getElementById('group-modal'),
            groupNameInput: document.getElementById('group-name-input'),
            iconPicker: document.getElementById('icon-picker'),
            selectedIconName: document.getElementById('selected-icon-name'),
            customIconPreviewContainer: document.getElementById('custom-icon-preview-container'),
            customIconPreview: document.getElementById('custom-icon-preview'),
            contextMenu: document.getElementById('context-menu'),
            cmContent: document.getElementById('cm-content')
        };

        function init() {
            renderGroups();
            renderNotes();
            renderIconPicker();
            setupGlobalEvents();
        }

        function renderIconPicker() {
            els.iconPicker.innerHTML = ICONS.map(icon => `
                <button type="button" onclick="selectIcon('${icon}')" class="p-2 border rounded-lg icon-option ${state.selectedIcon === icon ? 'active' : ''}" id="icon-${icon}">
                    <i data-lucide="${icon}" class="w-5 h-5 text-slate-600"></i>
                </button>
            `).join('');
            lucide.createIcons();
        }

        function selectIcon(icon) {
            state.selectedIcon = icon;
            state.customIconData = null;
            els.selectedIconName.innerText = icon;
            els.customIconPreviewContainer.classList.add('hidden');
            document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('active'));
            const activeEl = document.getElementById(`icon-${icon}`);
            if (activeEl) activeEl.classList.add('active');
        }

        function handleIconUpload(e) {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (ev) => {
                state.customIconData = ev.target.result;
                state.selectedIcon = null;
                els.selectedIconName.innerText = "custom";
                els.customIconPreview.src = state.customIconData;
                els.customIconPreviewContainer.classList.remove('hidden');
                document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('active'));
                lucide.createIcons();
            };
            reader.readAsDataURL(file);
        }

        function clearCustomIcon() {
            state.customIconData = null;
            els.customIconPreviewContainer.classList.add('hidden');
            selectIcon('folder');
        }

        function renderGroups() {
            let html = `
                <button onclick="selectGroup('all')" class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-lg ${state.currentGroupId === 'all' ? 'bg-white shadow-sm border border-slate-200 text-slate-900' : 'text-slate-500 hover:bg-slate-100 border border-transparent'}">
                    <i data-lucide="inbox" class="w-4 h-4 mr-3"></i> All Notes
                </button>
            `;
            state.groups.forEach(g => {
                const isActive = state.currentGroupId === g.id;
                const icon = g.type === 'custom' 
                    ? `<img src="${g.icon}" class="w-4 h-4 mr-3 rounded-sm object-cover">`
                    : `<i data-lucide="${g.icon}" class="w-4 h-4 mr-3"></i>`;
                
                html += `
                    <div class="group-item relative flex items-center" oncontextmenu="showContextMenu(event, 'group', '${g.id}')">
                        <button onclick="selectGroup('${g.id}')" class="w-full flex items-center px-3 py-2 text-sm font-medium rounded-lg ${isActive ? 'bg-white shadow-sm border border-slate-200 text-slate-900' : 'text-slate-500 hover:bg-slate-100 border border-transparent'}">
                            ${icon} <span class="truncate pr-8">${g.name}</span>
                        </button>
                        <div class="group-actions absolute right-2 flex gap-1">
                            <button onclick="openNewGroupModal('${g.id}')" class="p-1 text-slate-400 hover:text-slate-900"><i data-lucide="edit-3" class="w-3.5 h-3.5"></i></button>
                            <button onclick="deleteGroup('${g.id}')" class="p-1 text-slate-400 hover:text-red-500"><i data-lucide="trash" class="w-3.5 h-3.5"></i></button>
                        </div>
                    </div>
                `;
            });
            els.groupsList.innerHTML = html;
            els.editorGroupSelect.innerHTML = state.groups.map(g => `<option value="${g.id}">${g.name}</option>`).join('');
            lucide.createIcons();
        }

        function renderNotes() {
            const filtered = state.currentGroupId === 'all' ? state.notes : state.notes.filter(n => n.groupId === state.currentGroupId);
            els.noteCount.innerText = filtered.length;
            els.currentGroupTitle.innerText = state.currentGroupId === 'all' ? 'All Notes' : (state.groups.find(g => g.id === state.currentGroupId)?.name || 'Unknown');
            
            if (filtered.length === 0) {
                els.notesGrid.innerHTML = '';
                els.emptyState.classList.remove('hidden');
            } else {
                els.emptyState.classList.add('hidden');
                els.notesGrid.innerHTML = filtered.map(n => `
                    <div class="bg-white border border-slate-200 p-5 rounded-2xl hover:border-brand-900 transition-all cursor-pointer group shadow-sm hover:shadow-md" onclick="openEditor('${n.id}')" oncontextmenu="showContextMenu(event, 'note', '${n.id}')">
                        <div class="flex justify-between items-start mb-3">
                            <span class="text-[10px] font-bold text-slate-400 uppercase tracking-tighter bg-slate-50 px-1.5 py-0.5 rounded border border-slate-100">${state.groups.find(g => g.id === n.groupId)?.name || 'Misc'}</span>
                        </div>
                        <h3 class="font-bold text-slate-900 mb-2 truncate">${n.title || 'Untitled'}</h3>
                        <p class="text-sm text-slate-500 line-clamp-3 leading-relaxed">${n.content || '...'}</p>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function selectGroup(id) { state.currentGroupId = id; renderGroups(); renderNotes(); }

        function openNewGroupModal(id = null) {
            state.editingGroupId = id;
            if (id) {
                const g = state.groups.find(x => x.id === id);
                els.groupNameInput.value = g.name;
                document.getElementById('group-modal-title').innerText = "Edit Group";
                if(g.type === 'lucide') {
                    clearCustomIcon();
                    selectIcon(g.icon);
                } else {
                    state.customIconData = g.icon;
                    els.customIconPreview.src = g.icon;
                    els.customIconPreviewContainer.classList.remove('hidden');
                    els.selectedIconName.innerText = "custom";
                    document.querySelectorAll('.icon-option').forEach(e => e.classList.remove('active'));
                }
            } else {
                els.groupNameInput.value = '';
                document.getElementById('group-modal-title').innerText = "New Group";
                clearCustomIcon();
                selectIcon('folder');
            }
            els.groupModal.classList.remove('hidden');
            setTimeout(() => {
                els.groupModal.classList.replace('opacity-0', 'opacity-100');
                els.groupModal.firstElementChild.classList.replace('scale-95', 'scale-100');
                els.groupNameInput.focus();
            }, 10);
        }

        function closeGroupModal() {
            els.groupModal.classList.replace('opacity-100', 'opacity-0');
            els.groupModal.firstElementChild.classList.replace('scale-100', 'scale-95');
            setTimeout(() => els.groupModal.classList.add('hidden'), 200);
        }

        function saveGroup() {
            const name = els.groupNameInput.value.trim();
            if (!name) return;
            const icon = state.customIconData || state.selectedIcon;
            const type = state.customIconData ? 'custom' : 'lucide';

            if (state.editingGroupId) {
                const idx = state.groups.findIndex(g => g.id === state.editingGroupId);
                state.groups[idx] = { ...state.groups[idx], name, icon, type };
            } else {
                const newId = Date.now().toString();
                state.groups.push({ id: newId, name, icon, type });
                // If in the editor, auto-select this new group
                if (!els.editorView.classList.contains('hidden')) {
                    setTimeout(() => els.editorGroupSelect.value = newId, 0);
                }
            }
            renderGroups(); renderNotes(); closeGroupModal();
        }

        function deleteGroup(id) {
            state.groups = state.groups.filter(g => g.id !== id);
            state.notes = state.notes.filter(n => n.groupId !== id);
            if (state.currentGroupId === id) state.currentGroupId = 'all';
            renderGroups(); renderNotes();
        }

        function openEditor(id = null) {
            state.editingNoteId = id;
            if (id) {
                const n = state.notes.find(x => x.id === id);
                els.editorTitle.value = n.title;
                els.editorContent.value = n.content;
                els.editorGroupSelect.value = n.groupId;
            } else {
                els.editorTitle.value = '';
                els.editorContent.value = '';
                els.editorGroupSelect.value = state.currentGroupId === 'all' ? (state.groups[0]?.id || '') : state.currentGroupId;
            }
            els.editorView.classList.remove('hidden');
            setTimeout(() => els.editorView.classList.remove('translate-x-full'), 10);
        }

        function closeEditor() {
            els.editorView.classList.add('translate-x-full');
            setTimeout(() => els.editorView.classList.add('hidden'), 300);
        }

        function saveNote() {
            const title = els.editorTitle.value.trim();
            const content = els.editorContent.value.trim();
            const groupId = els.editorGroupSelect.value;
            if (!title && !content) return closeEditor();

            if (state.editingNoteId) {
                const idx = state.notes.findIndex(n => n.id === state.editingNoteId);
                state.notes[idx] = { ...state.notes[idx], title, content, groupId, updatedAt: Date.now() };
            } else {
                state.notes.push({ id: Date.now().toString(), title, content, groupId, updatedAt: Date.now() });
            }
            renderNotes(); closeEditor();
        }

        function deleteNote(id) {
            state.notes = state.notes.filter(n => n.id !== id);
            renderNotes();
        }

        function showContextMenu(e, type, id) {
            e.preventDefault();
            const cm = els.contextMenu;
            cm.style.display = 'block';
            cm.style.left = `${e.pageX}px`;
            cm.style.top = `${e.pageY}px`;

            let html = '';
            if (type === 'group') {
                html = `
                    <button onclick="openNewGroupModal('${id}'); hideCM()" class="w-full text-left px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 flex items-center rounded-md"><i data-lucide="edit" class="w-4 h-4 mr-2"></i> Rename</button>
                    <button onclick="deleteGroup('${id}'); hideCM()" class="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center rounded-md"><i data-lucide="trash" class="w-4 h-4 mr-2"></i> Delete</button>
                `;
            } else if (type === 'note') {
                html = `
                    <button onclick="openEditor('${id}'); hideCM()" class="w-full text-left px-3 py-2 text-sm text-slate-700 hover:bg-slate-100 flex items-center rounded-md"><i data-lucide="maximize" class="w-4 h-4 mr-2"></i> Open</button>
                    <button onclick="deleteNote('${id}'); hideCM()" class="w-full text-left px-3 py-2 text-sm text-red-600 hover:bg-red-50 flex items-center rounded-md"><i data-lucide="trash" class="w-4 h-4 mr-2"></i> Delete</button>
                `;
            }
            els.cmContent.innerHTML = html;
            lucide.createIcons();
        }

        function hideCM() { els.contextMenu.style.display = 'none'; }

        function setupGlobalEvents() {
            window.addEventListener('click', hideCM);
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') {
                    closeGroupModal();
                    closeEditor();
                    hideCM();
                }
            });
        }

        function toggleSidebar() {
            const side = document.getElementById('sidebar');
            const overlay = document.getElementById('mobile-overlay');
            if (side.classList.contains('-translate-x-full')) {
                side.classList.remove('-translate-x-full');
                overlay.classList.remove('hidden');
            } else {
                side.classList.add('-translate-x-full');
                overlay.classList.add('hidden');
            }
        }

        init();
    </script>
</body>
</html>
