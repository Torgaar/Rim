<html>
<head>
    <title>Notetaker</title>
</head>
<body>
    <h1>Notetaker Application</h1>
    <div id="slash-command-menu">
        <h2>Slash Command Menu</h2>
        <input type="text" id="commandInput" placeholder="Type your command here..." />
        <button onclick="executeCommand()">Execute</button>
    </div>
    <div id="time-chip">
        <h2>Time Chip Functionality</h2>
        <p>Current Time: <span id="currentTime"></span></p>
    </div>
    <script>
        function executeCommand() {
            const command = document.getElementById('commandInput').value;
            console.log('Command executed:', command);
        }
        function updateTime() {
            const now = new Date();
            document.getElementById('currentTime').innerText = now.toUTCString();
        }
        setInterval(updateTime, 1000);
        updateTime();
    </script>
</body>
</html>
